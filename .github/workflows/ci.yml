name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads the pinned version from packageManager
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: assert web assets ship inside the CLI
        run: test -f packages/cli/dist/public/index.html && test -f packages/cli/dist/install.sh
      # Self-smoke-tests the staged tree (puddled --version loads both native
      # modules), so the release packaging cannot rot between tags.
      - name: build the daemon tarball
        run: pnpm build:tarball
